<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="caseGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="caseGrad1b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#caseGrad1)"/>
  
  <!-- Abstract tech pattern -->
  <circle cx="50" cy="50" r="80" fill="white" opacity="0.05"/>
  <circle cx="350" cy="170" r="100" fill="white" opacity="0.05"/>
  
  <!-- Grid lines -->
  <g stroke="white" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="55" x2="400" y2="55"/>
    <line x1="0" y1="110" x2="400" y2="110"/>
    <line x1="0" y1="165" x2="400" y2="165"/>
    <line x1="80" y1="0" x2="80" y2="220"/>
    <line x1="160" y1="0" x2="160" y2="220"/>
    <line x1="240" y1="0" x2="240" y2="220"/>
    <line x1="320" y1="0" x2="320" y2="220"/>
  </g>
  
  <!-- Data visualization elements -->
  <rect x="60" y="140" width="60" height="60" rx="8" fill="white" opacity="0.15"/>
  <rect x="130" y="100" width="60" height="100" rx="8" fill="white" opacity="0.15"/>
  <rect x="200" y="70" width="60" height="130" rx="8" fill="white" opacity="0.15"/>
  <rect x="270" y="90" width="60" height="110" rx="8" fill="white" opacity="0.15"/>
  
  <!-- Rising trend line -->
  <polyline points="90,170 160,130 230,100 300,80" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <circle cx="300" cy="80" r="6" fill="white"/>
  
  <!-- Label -->
  <text x="200" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.8">科技行业解决方案</text>
</svg>
