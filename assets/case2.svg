<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="caseGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#caseGrad2)"/>
  
  <!-- Abstract shapes -->
  <circle cx="80" cy="60" r="60" fill="white" opacity="0.05"/>
  <circle cx="320" cy="160" r="80" fill="white" opacity="0.05"/>
  
  <!-- Shopping cart / e-commerce icon -->
  <g transform="translate(140, 70)">
    <rect x="0" y="30" width="120" height="8" rx="4" fill="white" opacity="0.2"/>
    <circle cx="30" cy="55" r="12" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
    <circle cx="90" cy="55" r="12" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
    <path d="M25 30 L45 30 L50 20 L55 30 L95 30" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  </g>
  
  <!-- Growth chart -->
  <g transform="translate(80, 130)">
    <rect x="0" y="60" width="30" height="30" rx="4" fill="white" opacity="0.15"/>
    <rect x="45" y="40" width="30" height="50" rx="4" fill="white" opacity="0.2"/>
    <rect x="90" y="20" width="30" height="70" rx="4" fill="white" opacity="0.25"/>
    <rect x="135" y="0" width="30" height="90" rx="4" fill="white" opacity="0.3"/>
    <rect x="180" y="-20" width="30" height="110" rx="4" fill="white" opacity="0.4"/>
    <rect x="225" y="-30" width="30" height="120" rx="4" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.8">电商行业解决方案</text>
</svg>
