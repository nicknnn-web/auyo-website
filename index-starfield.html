<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥呦 Logic | AI时代的首席认知官</title>
    <meta name="description" content="奥呦 Logic - AI时代的首席认知官。专注GEO生成引擎优化，让品牌成为AI脑海中的首选答案">
    <meta name="keywords" content="GEO,AI营销,生成引擎优化,品牌优化,ChatGPT,Claude,SEO,AI搜索">
    <meta name="author" content="奥呦 Logic">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="奥呦 Logic | AI时代的首席认知官">
    <meta property="og:description" content="专注GEO生成引擎优化，让品牌成为AI脑海中的首选答案">
    <meta property="og:type" content="website">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    },
                    colors: {
                        primary: '#14b8a6',
                        'primary-dark': '#0d9488',
                        dark: {
                            bg: '#0a0a1a',
                            card: '#111827',
                            border: '#1f2937',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: #0a0a1a;
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }
        
        .card {
            background: #111827;
            border: 1px solid transparent;
            border-radius: 12px;
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: #14b8a6;
        }
        
        .btn-primary {
            background: #f97316;
            transition: opacity 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        .btn-secondary {
            border: 1px solid #374151;
            transition: border-color 0.2s;
        }
        .btn-secondary:hover {
            border-color: #14b8a6;
        }
        
        .nav-scrolled {
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(10px);
        }
        
        /* Starfield Background */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* Logo blend mode for transparent effect */
        .logo-blend {
            mix-blend-mode: screen;
            filter: brightness(1.2) contrast(1.1);
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #14b8a6;
        }
    </style>
</head>
<body class="antialiased">
    
    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 py-4 border-b border-dark-border">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <a href="#" class="flex items-center">
                    <img src="assets/logo-transparent.png" alt="奥呦 Logic" class="h-12 w-auto">
                </a>
                
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#home" class="text-gray-400 hover:text-white transition-colors">首页</a>
                    <a href="#services" class="text-gray-400 hover:text-white transition-colors">服务</a>
                    <a href="#methodology" class="text-gray-400 hover:text-white transition-colors">方法论</a>
                    <a href="#cases" class="text-gray-400 hover:text-white transition-colors">案例</a>
                    <a href="#about" class="text-gray-400 hover:text-white transition-colors">关于</a>
                    <a href="#contact" class="px-5 py-2 btn-primary rounded-lg text-white font-medium">咨询</a>
                </div>
                
                <button id="mobile-menu-btn" class="md:hidden text-white">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden md:hidden bg-dark-bg border-t border-dark-border">
            <div class="px-4 py-4 space-y-3">
                <a href="#home" class="block text-gray-400 hover:text-white py-2">首页</a>
                <a href="#services" class="block text-gray-400 hover:text-white py-2">服务</a>
                <a href="#methodology" class="block text-gray-400 hover:text-white py-2">方法论</a>
                <a href="#cases" class="block text-gray-400 hover:text-white py-2">案例</a>
                <a href="#about" class="block text-gray-400 hover:text-white py-2">关于</a>
                <a href="#contact" class="block px-5 py-2 btn-primary rounded-lg text-white text-center mt-4">咨询</a>
            </div>
        </div>
    </nav>

    <!-- Hero with Starfield -->
    <section id="home" class="min-h-screen flex items-center justify-center pt-20 relative overflow-hidden">
        <!-- Starfield Background -->
        <div id="stars-container" class="absolute inset-0 overflow-hidden"></div>
        
        <div class="relative z-10 max-w-4xl mx-auto px-4 text-center">
            <div data-aos="fade-up">
                <!-- Logo -->
                <div class="mb-8">
                    <img src="assets/logo-transparent.png" alt="奥呦 Logic" class="h-20 md:h-28 w-auto mx-auto">
                </div>
                
                <div class="inline-flex items-center px-4 py-2 rounded-full bg-dark-card border border-dark-border mb-8">
                    <span class="w-2 h-2 bg-primary rounded-full mr-2"></span>
                    <span class="text-sm text-gray-400">AI时代的首席认知官</span>
                </div>
                
                <h1 class="text-5xl md:text-6xl font-bold mb-6 leading-tight">
                    让每一个提问，<br>
                    都给出您的<span class="text-primary">品牌答案</span>
                </h1>
                
                <p class="text-xl text-gray-400 max-w-2xl mx-auto mb-8">
                    奥呦 Logic — 专注GEO生成引擎优化，让品牌成为AI脑海中的首选答案
                </p>
                
                <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                    <a href="#contact" class="px-8 py-3 btn-primary rounded-lg text-white font-semibold">获取免费诊断</a>
                    <a href="#services" class="px-8 py-3 btn-secondary rounded-lg text-white">了解服务</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Generate stars
        const starsContainer = document.getElementById('stars-container');
        const starCount = 100;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 2 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
        
        lucide.createIcons();
        AOS.init({ duration: 600, once: true });
        
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('nav-scrolled');
            } else {
                navbar.classList.remove('nav-scrolled');
            }
        });
        
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
</body>
</html>
